---
name: Continuous Integration

on:
  pull_request:

# The API requires write permission on the repository to submit dependencies
permissions:
  contents: write
  actions: write
  packages: write

jobs:
  continuous_integration:
    name: Continuous Integration

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Erlang
        uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9 # v1.20.4
        id: setup-beam
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Restore Erlang cache
        uses: actions/cache/restore@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: |
            _build
            ~/.cache/rebar3
            !_build/test/logs
          key: unused
          # Pulls generically: without run id or run attempt
          # Otherwise, if trying to use the same key cache/save later errors out
          restore-keys: "cache-for\
                         -os-${{ runner.os }}\
                         -otp-${{ steps.setup-beam.outputs.otp-version }}\
                         -rebar3-${{ steps.setup-beam.outputs.rebar3-version }}\
                         -hash-${{ hashFiles('rebar.lock') }}-${{ hashFiles('rebar.config') }}\
                         -"

      - name: Run Continuous Integration
        run: |
          git config --global \
            url."https://github.com/".insteadOf 'git@github.com:'
          rebar3 ci

      - name: Save Erlang cache
        uses: actions/cache/save@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        with:
          path: |
            _build
            ~/.cache/rebar3
            !_build/test/logs
          # Saves specifically: with run id and run attempt
          key: "cache-for\
                -os-${{ runner.os }}\
                -otp-${{ steps.setup-beam.outputs.otp-version }}\
                -rebar3-${{ steps.setup-beam.outputs.rebar3-version }}\
                -hash-${{ hashFiles('rebar.lock') }}-${{ hashFiles('rebar.config') }}\
                -${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Submit local snapshot (test)
        run: |
          ./_build/default/bin/rebar3_dependency_submission --token ${{ github.token }}

      - name: Test release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run release.yaml \
            --ref ${{ github.ref }}
