---
name: Release
# Release a new version: prior to this you should've updated references to release-TAG

on:
  workflow_dispatch:
    inputs:
      tag:
        required: false
        type: string

jobs:
  release:
    name: Release

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new version
        id: tag-version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          release_branches: main

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch tag for release or testing
        id: tag
        run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            echo "value=${GITHUB_SHA}" >>"${GITHUB_OUTPUT}"
          else
            echo "value=${{ inputs.tag }}" >>"${GITHUB_OUTPUT}"
          fi

      - name: Build Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        id: build-push-action
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.value }}

      - name: Run Docker image
        run: |
          docker run \
            --volume ".:${GITHUB_WORKSPACE}" \
            --env GITHUB_API_URL="${GITHUB_API_URL}" \
            --env GITHUB_SERVER_URL="${GITHUB_SERVER_URL}" \
            --env GITHUB_WORKFLOW="${GITHUB_WORKFLOW}" \
            --env GITHUB_JOB="${GITHUB_JOB}" \
            --env GITHUB_REF="${GITHUB_REF}" \
            --env GITHUB_REPOSITORY="${GITHUB_REPOSITORY}" \
            --env GITHUB_RUN_ID="${GITHUB_RUN_ID}" \
            --env GITHUB_SHA="${GITHUB_SHA}" \
            --env GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/${{ github.repository }}@${{ steps.build-push-action.outputs.digest }}" \
            "$@"

      - name: Create a GitHub release
        if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
        run: |
          gh release create ${{ inputs.tag }} --generate-notes --latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
